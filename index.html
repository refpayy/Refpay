function getCtx(){if(!_ctx||_ctx.state==="closed"){try{_ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}return _ctx;}
function playTone(f,t="sine",d=0.12,v=0.12,dl=0){const c=getCtx();if(!c)return;const o=c.createOscillator(),g=c.createGain(),comp=c.createDynamicsCompressor();comp.threshold.value=-18;comp.knee.value=10;comp.ratio.value=4;o.connect(g);g.connect(comp);comp.connect(c.destination);o.type=t;o.frequency.setValueAtTime(f,c.currentTime+dl);o.frequency.exponentialRampToValueAtTime(f*.85,c.currentTime+dl+d);g.gain.setValueAtTime(0,c.currentTime+dl);g.gain.linearRampToValueAtTime(v,c.currentTime+dl+.01);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dl+d+.05);o.start(c.currentTime+dl);o.stop(c.currentTime+dl+d+.1);}

// ── ADS SCREEN ──
function AdsScreen({userId,onBack,toast,refresh}){
  const user=DB.users[userId];
  const[phase,setPhase]=useState("list");
  const[currentAd,setCurrentAd]=useState(null);
  const[timer,setTimer]=useState(15);
  const[sessionWatched,setSessionWatched]=useState([]);
  const timerRef=useRef(null);

  const totalAdsPool=DB.transactions.filter(t=>t.status==="approved").reduce((s,t)=>s+t.amount*.01,0);
  const activeUsers=Object.values(DB.users).filter(u=>u.role!=="admin"&&u.depositDone).length||1;
  const rewardPerAd=Math.max(5,Math.floor(totalAdsPool/activeUsers/10));

  const watchAd=(ad)=>{
    if(sessionWatched.includes(ad.id)){toast("Already watched this ad","info");return;}
    setCurrentAd(ad);setTimer(15);setPhase("watching");
    timerRef.current=setInterval(()=>{setTimer(t=>{if(t<=1){clearInterval(timerRef.current);completeAd(ad);return 0;}return t-1;});},1000);
  };
  const completeAd=(ad)=>{
    const earn=rewardPerAd;
    DB.adViews.push({id:tid(),userId,adId:ad.id,earn,date:new Date().toLocaleDateString("en-GB")});
    DB.users[userId].balance+=earn;DB.users[userId].totalEarned+=earn;
    DB.users[userId].adsWatched=(DB.users[userId].adsWatched||0)+1;
    DB.users[userId].adsEarned=(DB.users[userId].adsEarned||0)+earn;
    const referrerId=DB.users[userId].referrerId;
    if(referrerId&&DB.users[referrerId]&&DB.users[referrerId].depositDone){const refShare=Math.max(1,Math.floor(earn*0.01));DB.users[referrerId].balance+=refShare;DB.users[referrerId].totalEarned+=refShare;}
    const nw=[...sessionWatched,ad.id];setSessionWatched(nw);
    dbSave();playCoin();
    if(nw.length>=10){setPhase("done");toast(`🎉 All 10 ads watched! Earned PKR ${nw.length*earn}`,"success");}
    else{setPhase("list");toast(`+PKR ${earn} earned!`,"success");}
    refresh();
  };
  useEffect(()=>()=>clearInterval(timerRef.current),[]);
  const remaining=REAL_ADS.filter(a=>!sessionWatched.includes(a.id));

  if(phase==="watching"&&currentAd){
    return(
      <div style={{background:"var(--black)",minHeight:"100vh",position:"relative",overflow:"hidden"}}>
        <Particles/>
        <div style={{position:"relative",zIndex:1,padding:18,paddingBottom:48,animation:"fadeUp .3s ease"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22}}>
            <button onClick={()=>{clearInterval(timerRef.current);setPhase("list");}} style={{background:"#0d0b1a",border:"1px solid #1e1a30",color:"#4a4230",borderRadius:10,padding:"9px 14px",cursor:"pointer",fontSize:17}}>←</button>

            <div style={{fontSize:60,marginBottom:12,animation:"float 1.5s ease-in-out infinite"}}>{currentAd.logo}</div>
            <div style={{fontSize:17,fontWeight:900,color:currentAd.color,fontFamily:"'Cinzel',serif",marginBottom:6}}>{currentAd.title}</div>
            <div style={{fontSize:12,color:"#7a6830",marginBottom:16,lineHeight:1.6}}>{currentAd.desc}</div>
            <div style={{background:"#080712",borderRadius:12,padding:14,marginBottom:16,border:"1px solid #c9a84c18"}}>
              <div style={{fontSize:11,color:"#3a3020",marginBottom:6,letterSpacing:2,fontFamily:"'Orbitron',monospace"}}>REWARD FOR WATCHING</div>
              <div style={{fontSize:32,fontWeight:900,color:"#f5d380",fontFamily:"'Orbitron',monospace"}}>+PKR {rewardPerAd}</div>
            </div>
            <div style={{position:"relative",height:8,background:"#1e1a30",borderRadius:4,overflow:"hidden",marginBottom:12}}>
              <div style={{position:"absolute",left:0,top:0,height:"100%",background:"linear-gradient(90deg,#8b6914,#c9a84c,#f5d380)",borderRadius:4,transition:"width 1s linear",width:`${(15-timer)/15*100}%`}}/>

            <div style={{fontSize:11,color:"#3a3020",marginTop:4}}>Please watch until timer ends</div>
          </div>
        </div>
      </div>
    );

function Auth({onLogin,toast}){
  const[tab,setTab]=useState("login");

  const login=()=>{
    setErr("");
    if(isLocked(f.phone)){setErr(`Too many attempts. Try again in ${getLockRemaining(f.phone)}s`);return;}
    if(f.phone===ADMIN_PHONE&&f.pw===ADMIN_PASSWORD){playCoin();onLogin("ADMIN");return;}
    const u=Object.values(DB.users).find(u=>u.phone===f.phone&&u.password===f.pw);

    setErr("");

            Earn Referrals.<br/>

          <div style={{display:"flex",background:"#0d0b1a",border:"1px solid #1e1a30",borderRadius:14,padding:4,marginBottom:18}}>

          <div style={{fontSize:9,fontWeight:700,color:"#4a4230",letterSpacing:3,marginBottom:6,fontFamily:"'Orbitron',monospace"}}>Total Balance</div>

          <div style={{display:"flex",gap:20,marginTop:14}}>
            {[{l:"Referrals",v:activeRefs.length,c:"#c9a84c"},{l:"Total Earned",v:`₨${user.totalEarned.toLocaleString()}`,c:"#f5d380"},{l:"Status",v:user.depositDone?"Active":"Inactive",c:user.depositDone?"#27ae60":"#e74c3c"}].map(ss=>(
              <div key={ss.l}>
                <div style={{fontSize:14,fontWeight:900,color:ss.c,fontFamily:"'Orbitron',monospace"}}>{ss.v}</div>
                <div style={{fontSize:8,color:"#3a3020",marginTop:2,letterSpacing:1,fontWeight:700,fontFamily:"'Orbitron',monospace"}}>{ss.l.toUpperCase()}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:7,marginTop:16}}>

            <button onClick={()=>{if(user.depositDone&&user.balance>=MIN_WITHDRAW){playCoin();onWithdraw();}}} disabled={!user.depositDone||user.balance<MIN_WITHDRAW} style={{flex:1,background:user.depositDone&&user.balance>=MIN_WITHDRAW?"linear-gradient(135deg,#3d2c00,#c9a84c,#8b6914)":"#0d0b1a",border:"none",borderRadius:11,padding:"11px 0",fontWeight:800,fontSize:11,color:user.depositDone&&user.balance>=MIN_WITHDRAW?"#0a0800":"#1a1800",cursor:user.depositDone&&user.balance>=MIN_WITHDRAW?"pointer":"not-allowed",letterSpacing:1,fontFamily:"'Rajdhani',sans-serif"}}>WITHDRAW</button>
          </div>

        {/* QUICK ACTIONS */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div onClick={()=>{playCoin();onTasks();}} className="card-hover" style={{background:"linear-gradient(135deg,#0a0800,#1a1200)",border:"1px solid #c9a84c22",borderRadius:16,padding:16,cursor:"pointer"}}>
            <div style={{fontSize:28,marginBottom:8,animation:"float 2.5s ease-in-out infinite"}}>🎯</div>
            <div style={{fontSize:13,fontWeight:900,color:"#c9a84c",fontFamily:"'Rajdhani',sans-serif"}}>Tasks</div>
            <div style={{fontSize:10,color:"#3a3020",marginTop:2}}>{activeTasks>0?`${activeTasks} available`:"Check back soon"}</div>
          </div>
          <div onClick={()=>{playCoin();onAds();}} className="card-hover" style={{background:"linear-gradient(135deg,#0a0f1a,#001a1a)",border:"1px solid #27ae6022",borderRadius:16,padding:16,cursor:"pointer"}}>
            <div style={{fontSize:28,marginBottom:8,animation:"float 3s ease-in-out infinite"}}>📺</div>
            <div style={{fontSize:13,fontWeight:900,color:"#27ae60",fontFamily:"'Rajdhani',sans-serif"}}>Watch Ads</div>
            <div style={{fontSize:10,color:"#1a3020",marginTop:2}}>{todayAds}/10 today</div>
          </div>
        </div>

        {/* REFERRAL CODE */}
        {user.depositDone?(
          <Card glow s={{marginBottom:14}}>
            <div style={{fontSize:10,fontWeight:700,color:"#4a4230",letterSpacing:2,marginBottom:12,fontFamily:"'Orbitron',monospace"}}>🔗 Your Referral Code</div>
            <div style={{display:"flex",gap:9,alignItems:"center",marginBottom:8}}>
              <div style={{flex:1,background:"#080712",borderRadius:12,padding:"14px 0",textAlign:"center",border:"1.5px dashed #c9a84c25",fontSize:22,fontWeight:900,letterSpacing:7,color:"#f5d380",fontFamily:"'Orbitron',monospace"}}>{user.referralCode}</div>
              <button onClick={copyCode} style={{background:"linear-gradient(135deg,#3d2c00,#c9a84c)",color:"#0a0800",border:"none",borderRadius:12,padding:"14px 16px",fontWeight:800,cursor:"pointer",fontSize:12}}>Copy</button>
            </div>
            <div style={{fontSize:11,color:"#3a3020",textAlign:"center",lineHeight:1.5}}>
              Share this code — earn <span style={{color:"#c9a84c",fontWeight:700}}>PKR {approvedDep?.referrerShare||"---"}</span> per referral activation
            </div>
            {/* Mini referral stats */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginTop:12}}>
              {[{l:"Total Refs",v:refs.length,c:"#c9a84c"},{l:"Active",v:activeRefs.length,c:"#27ae60"},{l:"Pending",v:refs.length-activeRefs.length,c:"#f39c12"}].map(ss=>(
                <div key={ss.l} style={{background:"#080712",border:`1px solid ${ss.c}18`,borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                  <div style={{fontSize:18,fontWeight:900,color:ss.c,fontFamily:"'Orbitron',monospace"}}>{ss.v}</div>
                  <div style={{fontSize:8,color:"#3a3020",marginTop:2,letterSpacing:.5,fontFamily:"'Orbitron',monospace"}}>{ss.l.toUpperCase()}</div>
                </div>
              ))}
            </div>
          </Card>
        ):(
          <div style={{background:"#0d0b1a",border:"1px solid #1e1a30",borderRadius:16,padding:16,marginBottom:14,opacity:.5}}>
            <div style={{fontSize:12,color:"#e74c3c",fontWeight:700}}>🔒 Referral code unlocks after deposit approval</div>
          </div>
        )}

        {/* HOW IT WORKS */}
        <HowItWorks/>

        {/* ANNOUNCEMENTS */}
        <div style={{background:"linear-gradient(135deg,#0a0800,#1a1200)",border:"1px solid #c9a84c18",borderRadius:16,padding:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"#4a4230",letterSpacing:2,marginBottom:12,fontFamily:"'Orbitron',monospace"}}>📢 ANNOUNCEMENTS</div>
          {DB.announcements.filter(a=>a.id!=="ann0").map(a=>(
            <div key={a.id} style={{marginBottom:10,padding:"12px 14px",background:"#080712",borderRadius:14,border:`1px solid ${a.color}22`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <div style={{width:30,height:30,borderRadius:9,background:a.color+"18",border:`1px solid ${a.color}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{a.title.slice(0,2)}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:900,color:a.color,lineHeight:1.2}}>{a.title}</div>
                  <div style={{fontSize:9,color:"#3a3020",fontFamily:"'Orbitron',monospace",marginTop:1}}>{a.date}</div>
                </div>
              </div>
              <div style={{fontSize:11,color:"#3a3020",lineHeight:1.6,paddingLeft:38}}>{a.desc}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── ADMIN ──
function AdminPanel({onLogout,toast}){
  const[tab,setTab]=useState("deposits");
  const[tick,setTick]=useState(0);
  const refresh=()=>setTick(t=>t+1);
  const s=DB.settings;
  const[ep,setEp]=useState(s.adminEasypaisa);const[jc,setJc]=useState(s.adminJazzcash);
  const[bankNum,setBankNum]=useState(s.adminBank.account);const[bankName,setBankName]=useState(s.adminBank.name);const[bankTitle,setBankTitle]=useState(s.adminBank.title);
  const[binUid,setBinUid]=useState(s.adminBinance.uid);const[binName,setBinName]=useState(s.adminBinance.name);
  const[adsEnabled,setAdsEnabled]=useState(s.adsEnabled);const[adsPerSession,setAdsPerSession]=useState(String(s.adsPerSession));
  const[nt,setNt]=useState({title:"",desc:"",commission:"",deadline:""});const snt=k=>v=>setNt(p=>({...p,[k]:v}));

  const pDeps=DB.transactions.filter(t=>t.status==="pending");
  const pW=DB.withdrawals.filter(w=>w.status==="pending");
  const pSubs=DB.taskSubmissions.filter(s=>s.status==="pending");
  const users=Object.values(DB.users).filter(u=>u.role!=="admin");
  const aDeps=DB.transactions.filter(t=>t.status==="approved");
  const totalAdmin=aDeps.reduce((ss,t)=>ss+t.adminShare,0);
  const totalRef=aDeps.reduce((ss,t)=>ss+t.referrerShare,0);

  const saveSettings=()=>{DB.settings.adminEasypaisa=ep;DB.settings.adminJazzcash=jc;DB.settings.adminBank={name:bankName,account:bankNum,title:bankTitle};DB.settings.adminBinance={uid:binUid,name:binName};DB.settings.adsEnabled=adsEnabled;DB.settings.adsPerSession=parseInt(adsPerSession)||10;dbSave();toast("Settings saved!","success");refresh();};
  const appD=id=>{const t=DB.transactions.find(x=>x.id===id);if(!t)return;t.status="approved";if(DB.users[t.userId]){DB.users[t.userId].depositDone=true;DB.users[t.userId].canRefer=true;}if(t.referrerId&&DB.users[t.referrerId]){DB.users[t.referrerId].balance+=t.referrerShare;DB.users[t.referrerId].totalEarned+=t.referrerShare;}DB.users.ADMIN.balance+=t.adminShare;DB.users.ADMIN.totalEarned+=t.adminShare;dbSave();playCoin();toast(`Approved! Earned PKR ${t.adminShare.toLocaleString()}`,"success");refresh();};
  const rejD=id=>{const t=DB.transactions.find(x=>x.id===id);if(t)t.status="rejected";dbSave();toast("Deposit rejected","error");refresh();};
  const appW=id=>{const w=DB.withdrawals.find(x=>x.id===id);if(!w)return;w.status="approved";dbSave();playCoin();toast(`Send PKR ${w.youGet.toLocaleString()} to ${w.accNumber}`,"success");refresh();};
  const rejW=id=>{const w=DB.withdrawals.find(x=>x.id===id);if(!w)return;w.status="rejected";if(DB.users[w.userId])DB.users[w.userId].balance+=w.amount;dbSave();toast("Rejected - balance refunded","info");refresh();};
  const appS=id=>{const ss=DB.taskSubmissions.find(x=>x.id===id);if(!ss)return;ss.status="approved";if(DB.users[ss.userId]){DB.users[ss.userId].balance+=ss.taskCommission;DB.users[ss.userId].totalEarned+=ss.taskCommission;}dbSave();playCoin();toast(`Task approved! PKR ${ss.taskCommission.toLocaleString()} paid`,"success");refresh();};
  const rejS=id=>{const ss=DB.taskSubmissions.find(x=>x.id===id);if(ss)ss.status="rejected";dbSave();toast("Task rejected","error");refresh();};
  const addTask=()=>{if(!nt.title||!nt.commission){toast("Title and commission required","error");return;}DB.tasks.push({id:tid(),title:nt.title,description:nt.desc,commission:parseInt(nt.commission)||0,deadline:nt.deadline||"Open",status:"active",date:new Date().toLocaleDateString("en-GB")});setNt({title:"",desc:"",commission:"",deadline:""});dbSave();playCoin();toast("Task posted!","success");refresh();};
  const deleteTask=id=>{const idx=DB.tasks.findIndex(t=>t.id===id);if(idx>-1)DB.tasks.splice(idx,1);dbSave();toast("Task deleted","info");refresh();};

  const tabs=[["deposits",`Deposits (${pDeps.length})`,`#c9a84c`],["withdrawals",`Withdrawals (${pW.length})`,"#7dd3fc"],["tasks",`Tasks (${pSubs.length})`,"#a78bfa"],["newtask","+ New Task","#27ae60"],["members",`Members (${users.length})`,"#94a3b8"],["settings","⚙️ Settings","#f0b90b"]];

  return(
    <div style={{background:"var(--black)",minHeight:"100vh",position:"relative",overflow:"hidden"}}>
      <Particles/>
      <div style={{position:"relative",zIndex:1,padding:"16px 16px 48px",animation:"fadeUp .35s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div><Logo/><div style={{display:"inline-flex",alignItems:"center",gap:5,marginTop:6,background:"#0a0800",border:"1px solid #c9a84c22",borderRadius:20,padding:"3px 11px"}}><span style={{fontSize:9,fontWeight:800,color:"#c9a84c",letterSpacing:2,fontFamily:"'Orbitron',monospace"}}>🔐 ADMIN DASHBOARD</span></div></div>
          <button onClick={()=>{playCoin();onLogout();}} style={{background:"#0d0b1a",border:"1px solid #1e1a30",color:"#4a4230",borderRadius:9,padding:"7px 13px",cursor:"pointer",fontSize:11,fontWeight:700}}>Sign Out</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {[{l:"Platform Revenue",v:`₨${totalAdmin.toLocaleString()}`,c:"#c9a84c",i:"💰"},{l:"Paid to Members",v:`₨${totalRef.toLocaleString()}`,c:"#27ae60",i:"💸"},{l:"Registered",v:users.length,c:"#a78bfa",i:"👥"},{l:"Active Members",v:users.filter(u=>u.depositDone).length,c:"#7dd3fc",i:"✦"},{l:"Pending Actions",v:pDeps.length+pW.length+pSubs.length,c:pDeps.length+pW.length+pSubs.length>0?"#e74c3c":"#3a3020",i:"⏳"},{l:"Admin Code",v:"REFPAY2025",c:"#f5d380",i:"🔗"}].map(ss=>(
            <div key={ss.l} style={{background:"#0d0b1a",border:"1px solid #1e1a30",borderRadius:13,padding:12,borderTop:`2px solid ${ss.c}33`}}>
              <div style={{fontSize:9,color:"#3a3020",letterSpacing:.5,textTransform:"uppercase",marginBottom:4,fontWeight:700,fontFamily:"'Orbitron',monospace"}}>{ss.i} {ss.l}</div>
              <div style={{fontSize:16,fontWeight:900,color:ss.c,fontFamily:"'Orbitron',monospace"}}>{ss.v}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:5,marginBottom:14,overflowX:"auto",paddingBottom:3,WebkitOverflowScrolling:"touch"}}>
          {tabs.map(([id,l,c])=>(
            <button key={id} onClick={()=>{playCoin();setTab(id);}} style={{padding:"7px 12px",borderRadius:20,whiteSpace:"nowrap",flexShrink:0,background:tab===id?c+"18":"#0d0b1a",color:tab===id?c:"#3a3020",border:`1px solid ${tab===id?c+"44":"#1e1a30"}`,fontWeight:700,fontSize:10,cursor:"pointer",transition:"all .2s",fontFamily:"'Rajdhani',sans-serif"}}>{l}</button>
          ))}
        </div>
        {tab==="deposits"&&<div>{pDeps.length===0?<div style={{textAlign:"center",color:"#3a3020",padding:40,fontSize:12,fontFamily:"'Orbitron',monospace"}}>NO PENDING DEPOSITS ✦</div>:pDeps.map(t=>{const p=getPlan(t.amount);return(<Card key={t.id} glow color={p.color} s={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}><div><div style={{fontWeight:800,color:"#f5d380",fontSize:13}}>{t.userName}</div><div style={{fontSize:9,color:"#3a3020",fontFamily:"'Orbitron',monospace"}}>{t.userPhone} · {t.date}</div></div><Badge l="Pending" c="#c9a84c"/></div><div style={{background:"#080712",borderRadius:10,padding:10,marginBottom:9}}><div style={{fontSize:20,fontWeight:900,color:p.color,fontFamily:"'Orbitron',monospace",marginBottom:4}}>{p.icon} PKR {t.amount.toLocaleString()}</div><div style={{fontSize:10,color:"#3a3020"}}>{t.method.toUpperCase()} · TXN: {t.txnId}</div></div><div style={{display:"flex",gap:7}}><Btn ch="✦ Approve" v="gold" onClick={()=>appD(t.id)} s={{padding:"10px 0",fontSize:12}}/><Btn ch="✕ Reject" v="red" onClick={()=>rejD(t.id)} s={{padding:"10px 0",fontSize:12}}/></div></Card>);})}</div>}
        {tab==="withdrawals"&&<div>{pW.length===0?<div style={{textAlign:"center",color:"#3a3020",padding:40,fontSize:12,fontFamily:"'Orbitron',monospace"}}>NO PENDING WITHDRAWALS</div>:pW.map(w=>(<Card key={w.id} glow color="#7dd3fc" s={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:9}}><div><div style={{fontWeight:800,color:"#f5d380",fontSize:13}}>{w.userName}</div><div style={{fontSize:9,color:"#3a3020",fontFamily:"'Orbitron',monospace"}}>{w.date}</div></div><Badge l="Pending" c="#c9a84c"/></div><div style={{background:"#080712",borderRadius:11,padding:12,marginBottom:9}}><div style={{fontSize:24,fontWeight:900,color:"#f5d380",marginBottom:6,fontFamily:"'Orbitron',monospace"}}>PKR {w.youGet.toLocaleString()}</div><div style={{fontSize:12,color:"#4a4230"}}>{w.method.toUpperCase()}: <b style={{color:"#e8dfc0"}}>{w.accNumber}</b></div><div style={{fontSize:11,color:"#3a3020",marginTop:2}}>{w.accName}</div></div><div style={{display:"flex",gap:7}}><Btn ch="✦ Mark Sent" v="gold" onClick={()=>appW(w.id)} s={{padding:"10px 0",fontSize:12}}/><Btn ch="✕ Reject" v="red" onClick={()=>rejW(w.id)} s={{padding:"10px 0",fontSize:12}}/></div></Card>))}</div>}
        {tab==="tasks"&&<div>{pSubs.length===0?<div style={{textAlign:"center",color:"#3a3020",padding:36,fontSize:12,fontFamily:"'Orbitron',monospace"}}>NO PENDING SUBMISSIONS</div>:pSubs.map(ss=>(<Card key={ss.id} glow color="#a78bfa" s={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:9}}><div><div style={{fontWeight:800,color:"#f5d380",fontSize:13}}>{ss.userName}</div><div style={{fontSize:9,color:"#3a3020",fontFamily:"'Orbitron',monospace"}}>{ss.date}</div></div><Badge l="Review" c="#c9a84c"/></div><div style={{background:"#080712",borderRadius:11,padding:11,marginBottom:9}}><div style={{fontSize:11,fontWeight:800,color:"#a78bfa",marginBottom:4}}>🎯 {ss.taskTitle}</div><div style={{fontSize:11,color:"#4a4230",wordBreak:"break-all"}}>{ss.submission}</div><div style={{fontSize:18,fontWeight:900,color:"#c9a84c",marginTop:7,fontFamily:"'Orbitron',monospace"}}>PKR {ss.taskCommission.toLocaleString()}</div></div><div style={{display:"flex",gap:7}}><Btn ch="✦ Approve" v="gold" onClick={()=>appS(ss.id)} s={{padding:"10px 0",fontSize:12}}/><Btn ch="✕ Reject" v="red" onClick={()=>rejS(ss.id)} s={{padding:"10px 0",fontSize:12}}/></div></Card>))}</div>}
        {tab==="newtask"&&(<Card glow color="#27ae60"><div style={{fontSize:16,fontWeight:900,color:"#f5d380",marginBottom:16,fontFamily:"'Cinzel',serif"}}>Post New Task</div><Inp label="Task Title" value={nt.title} onChange={snt("title")} placeholder="e.g. Create a Travel Vlog Video" required/><Inp label="Description" value={nt.desc} onChange={snt("desc")} placeholder="Detailed task requirements..." rows={3}/><Inp label="Commission (PKR)" value={nt.commission} onChange={snt("commission")} placeholder="e.g. 500" type="number" required/><Inp label="Deadline" value={nt.deadline} onChange={snt("deadline")} placeholder="e.g. 3 days / Open"/><Btn ch="🎯 Post Task" v="gold" onClick={addTask} disabled={!nt.title||!nt.commission}/>{DB.tasks.length>0&&<div style={{marginTop:20}}><div style={{fontSize:10,fontWeight:700,color:"#4a4230",letterSpacing:2,marginBottom:10,fontFamily:"'Orbitron',monospace"}}>ACTIVE TASKS</div>{DB.tasks.filter(t=>t.status==="active").map(task=>(<div key={task.id} style={{background:"#080712",border:"1px solid #1e1a30",borderRadius:12,padding:12,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:800,color:"#c9a84c",fontSize:12}}>{task.title}</div><div style={{fontSize:10,color:"#3a3020",fontFamily:"'Orbitron',monospace"}}>PKR {task.commission.toLocaleString()}</div></div><button onClick={()=>{playCoin();deleteTask(task.id);}} style={{background:"#2a0a0a",border:"1px solid #7f1d1d33",color:"#e74c3c",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:10,fontWeight:700}}>Delete</button></div>))}</div>}</Card>)}
        {tab==="members"&&<div>{users.length===0?<div style={{textAlign:"center",color:"#3a3020",padding:36,fontSize:12,fontFamily:"'Orbitron',monospace"}}>NO MEMBERS YET</div>:users.map(u=>{const dep=DB.transactions.find(t=>t.userId===u.id&&t.status==="approved");const p=dep?getPlan(dep.amount):null;return(<div key={u.id} style={{background:"#0d0b1a",border:"1px solid #1e1a30",borderRadius:14,padding:13,marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><div style={{fontWeight:800,color:"#f5d380",fontSize:13}}>{u.name}</div><Badge l={u.depositDone?"Active":"Inactive"} c={u.depositDone?"#27ae60":"#e74c3c"}/></div><div style={{fontSize:10,color:"#3a3020",marginBottom:7,fontFamily:"'Orbitron',monospace"}}>{u.phone} · {u.joinDate}</div><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{p&&<Badge l={`${p.icon} ${p.label}`} c={p.color}/>}<Badge l={`Code: ${u.referralCode}`} c="#c9a84c"/><Badge l={`₨${u.balance.toLocaleString()}`} c={u.balance>0?"#c9a84c":"#3a3020"}/></div></div>);})}</div>}
        {tab==="settings"&&(<div><Card glow color="#f0b90b" s={{marginBottom:12}}><div style={{fontSize:15,fontWeight:900,color:"#f5d380",marginBottom:16,fontFamily:"'Cinzel',serif"}}>⚙️ Payment Settings</div><div style={{marginBottom:14,padding:14,background:"#080712",borderRadius:12,border:"1px solid #27ae6022"}}><div style={{fontSize:10,fontWeight:700,color:"#27ae60",letterSpacing:2,marginBottom:10,fontFamily:"'Orbitron',monospace"}}>💚 EASYPAISA</div><Inp label="EasyPaisa Number" value={ep} onChange={setEp} placeholder="03XXXXXXXXX" type="tel"/></div><div style={{marginBottom:14,padding:14,background:"#080712",borderRadius:12,border:"1px solid #e91e8c22"}}><div style={{fontSize:10,fontWeight:700,color:"#e91e8c",letterSpacing:2,marginBottom:10,fontFamily:"'Orbitron',monospace"}}>🔴 JAZZCASH</div><Inp label="JazzCash Number" value={jc} onChange={setJc} placeholder="03XXXXXXXXX" type="tel"/></div><div style={{marginBottom:14,padding:14,background:"#080712",borderRadius:12,border:"1px solid #2980b922"}}><div style={{fontSize:10,fontWeight:700,color:"#2980b9",letterSpacing:2,marginBottom:10,fontFamily:"'Orbitron',monospace"}}>🏦 BANK</div><Inp label="Bank Name" value={bankName} onChange={setBankName} placeholder="e.g. Meezan Bank"/><Inp label="Account Number" value={bankNum} onChange={setBankNum} placeholder="XXXXXXXXXXXXXXXX"/><Inp label="Account Title" value={bankTitle} onChange={setBankTitle} placeholder="e.g. RefPay Admin"/></div><div style={{marginBottom:14,padding:14,background:"#080712",borderRadius:12,border:"1px solid #f0b90b22"}}><div style={{fontSize:10,fontWeight:700,color:"#f0b90b",letterSpacing:2,marginBottom:10,fontFamily:"'Orbitron',monospace"}}>🟡 BINANCE</div><Inp label="Binance UID" value={binUid} onChange={setBinUid} placeholder="Your Binance UID"/><Inp label="Account Name" value={binName} onChange={setBinName} placeholder="Name on Binance"/></div><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:"#080712",borderRadius:12,marginBottom:14,border:"1px solid #1e1a30"}}><div><div style={{fontWeight:800,color:"#f5d380",fontSize:13}}>Ads Enabled</div><div style={{fontSize:10,color:"#3a3020"}}>Allow users to watch ads</div></div><div onClick={()=>{playCoin();setAdsEnabled(a=>!a);}} style={{width:44,height:24,borderRadius:12,background:adsEnabled?"linear-gradient(135deg,#27ae60,#2ecc71)":"#1e1a30",cursor:"pointer",position:"relative",transition:"all .3s"}}><div style={{position:"absolute",top:3,left:adsEnabled?22:3,width:16,height:16,borderRadius:"50%",background:"#fff",transition:"all .3s"}}/></div></div><Inp label="Ads Per Session (daily per user)" value={adsPerSession} onChange={setAdsPerSession} type="number" placeholder="10"/><Btn ch="💾 Save All Settings" v="gold" onClick={saveSettings}/></Card></div>)}
      </div>
    </div>
  );
}

// ── APP ──
function App(){
  const[screen,setScreen]=useState("splash");
  const[userId,setUserId]=useState(null);
  const[toastData,setToastData]=useState(null);
  const[tick,setTick]=useState(0);
  const showToast=(msg,type="info")=>setToastData({msg,type});
  const refresh=()=>setTick(t=>t+1);

  useEffect(()=>{window.__hideLoading&&window.__hideLoading();},[]);

  const handleLogin=id=>{
    setUserId(id);const u=DB.users[id];
    setScreen(u.role==="admin"?"admin":!u.depositDone?"pending":"dashboard");
  };
  const handleLogout=()=>{setUserId(null);setScreen("auth");};
  const user=userId?DB.users[userId]:null;

  return(
    <div style={{background:"var(--black)",minHeight:"100vh"}}>
      <div style={{maxWidth:440,margin:"0 auto",minHeight:"100vh",position:"relative"}}>
        {toastData&&<Toast msg={toastData.msg} type={toastData.type} onClose={()=>setToastData(null)}/>}
        {screen==="splash"&&<Splash onDone={()=>setScreen("auth")}/>}
        {screen==="auth"&&<Auth onLogin={handleLogin} toast={showToast}/>}
        {(screen==="dashboard"||screen==="pending")&&user&&(
          <UserDash key={tick} userId={userId} onLogout={handleLogout}
            onDeposit={()=>setScreen("deposit")}
            onWithdraw={()=>setScreen("withdraw")}
            onTasks={()=>setScreen("tasks")}
            onAds={()=>setScreen("ads")}
            toast={showToast}/>
        )}
        {screen==="deposit"&&user&&(
          <Deposit userId={userId}
            onBack={()=>setScreen(user.depositDone?"dashboard":"pending")}
            onDone={()=>{refresh();setScreen("pending");}}
            toast={showToast}/>
        )}
        {screen==="withdraw"&&user&&(
          <Withdraw userId={userId}
            onBack={()=>setScreen("dashboard")}
            toast={showToast} refresh={refresh}/>
        )}
        {screen==="tasks"&&user&&(
          <TasksScreen userId={userId}
            onBack={()=>setScreen("dashboard")}
            toast={showToast} refresh={refresh}/>
        )}
        {screen==="ads"&&user&&(
          <AdsScreen userId={userId}
            onBack={()=>setScreen("dashboard")}
            toast={showToast} refresh={refresh}/>
        )}
        {screen==="admin"&&<AdminPanel onLogout={handleLogout} toast={showToast}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

let _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx||_audioCtx.state==="closed"){
    try{_audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}
  }
  return _audioCtx;
}
function playTone(freq,type="sine",dur=0.12,vol=0.12,delay=0){
  const ctx=getAudioCtx();if(!ctx)return;
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  const comp=ctx.createDynamicsCompressor();
  comp.threshold.value=-18;comp.knee.value=10;comp.ratio.value=4;
  o.connect(g);g.connect(comp);comp.connect(ctx.destination);
  o.type=type;
  o.frequency.setValueAtTime(freq,ctx.currentTime+delay);
  o.frequency.exponentialRampToValueAtTime(freq*0.85,ctx.currentTime+delay+dur);
  g.gain.setValueAtTime(0,ctx.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol,ctx.currentTime+delay+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+dur+0.05);
  o.start(ctx.currentTime+delay);
  o.stop(ctx.currentTime+delay+dur+0.1);
}
function playCoin(){
  // Smooth gold coin sound — ascending chime
  [[660,0],[880,0.06],[1100,0.12],[1320,0.18]].forEach(([f,d])=>playTone(f,"sine",0.18,0.10,d));
}

}

const _loginAttempts={};
const _lockUntil={};
function recordLoginAttempt(phone){
  const now=Date.now();
  if(!_loginAttempts[phone])_loginAttempts[phone]={count:0,first:now};
  const a=_loginAttempts[phone];
  // Reset if last attempt > 15 min ago
  if(now-a.first>15*60*1000){a.count=0;a.first=now;}
  a.count++;
  if(a.count>=5){
    _lockUntil[phone]=now+5*60*1000; // lock 5 min
    a.count=0;a.first=now;
  }
}
function isLocked(phone){
  if(!_lockUntil[phone])return false;
  if(Date.now()<_lockUntil[phone])return true;
  delete _lockUntil[phone];return false;
}
function getLockRemaining(phone){
  if(!_lockUntil[phone])return 0;
  return Math.ceil((_lockUntil[phone]-Date.now())/1000);
}

// ADS SCREEN
// ═══════════════════════════════
function AdsScreen({userId,onBack,toast,refresh}){
  const user=DB.users[userId];
  const [phase,setPhase]=useState("list");
  const [currentAd,setCurrentAd]=useState(null);
  const [timer,setTimer]=useState(15);
  const [watchedToday,setWatchedToday]=useState(
    DB.adViews.filter(v=>v.userId===userId&&v.date===new Date().toLocaleDateString("en-GB")).length
  );
  const [sessionWatched,setSessionWatched]=useState([]);
  const timerRef=useRef(null);

  const totalAdsPool=DB.transactions.filter(t=>t.status==="approved").reduce((s,t)=>s+t.amount*.01,0);
  const activeUsers=Object.values(DB.users).filter(u=>u.role!=="admin"&&u.depositDone).length||1;
  const rewardPerAd=Math.max(5,Math.floor(totalAdsPool/activeUsers/10));

  const watchAd=(ad)=>{
    if(sessionWatched.includes(ad.id)){toast("Already watched this ad","info");return;}
    setCurrentAd(ad);setTimer(15);setPhase("watching");
    timerRef.current=setInterval(()=>{
      setTimer(t=>{
        if(t<=1){
          clearInterval(timerRef.current);
          completeAd(ad);
          return 0;
        }
        return t-1;
      });
    },1000);
  };

  const completeAd=(ad)=>{
    const earn=rewardPerAd;
    DB.adViews.push({id:tid(),userId,adId:ad.id,earn,date:new Date().toLocaleDateString("en-GB")});
    DB.users[userId].balance+=earn;
    DB.users[userId].totalEarned+=earn;
    DB.users[userId].adsWatched=(DB.users[userId].adsWatched||0)+1;
    DB.users[userId].adsEarned=(DB.users[userId].adsEarned||0)+earn;
    // 1% share to referrer when member watches ads
    const referrerId=DB.users[userId].referrerId;
    if(referrerId&&DB.users[referrerId]&&DB.users[referrerId].depositDone){
      const refShare=Math.max(1,Math.floor(earn*0.01*100)/100||1);
      DB.users[referrerId].balance+=refShare;
      DB.users[referrerId].totalEarned+=refShare;
    }
    const newWatched=[...sessionWatched,ad.id];
    setSessionWatched(newWatched);
    setWatchedToday(w=>w+1);
    dbSave();
    playCoin();
    if(newWatched.length>=10){
      setPhase("done");
      toast(`🎉 All 10 ads watched! Earned PKR ${newWatched.length*earn}`,"success");
    } else {
      setPhase("list");
      toast(`+PKR ${earn} earned! Watch more ads.`,"success");
    }
    refresh();
  };

  useEffect(()=>()=>clearInterval(timerRef.current),[]);

  const remaining=REAL_ADS.filter(a=>!sessionWatched.includes(a.id));

  if(phase==="watching"&&currentAd){
    return(
      <div style={{background:"var(--black)",minHeight:"100vh",position:"relative",overflow:"hidden"}}>
        <Particles/>
        <div style={{position:"relative",zIndex:1,padding:18,paddingBottom:48,animation:"fadeUp .3s ease"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22}}>
            <button onClick={()=>{clearInterval(timerRef.current);setPhase("list");}} style={{background:"#0d0b1a",border:"1px solid #1e1a30",color:"#4a4230",borderRadius:10,padding:"9px 14px",cursor:"pointer",fontSize:17}}>←</button>
            <div style={{fontSize:18,fontWeight:900,color:"#f5d380",fontFamily:"'Cinzel',serif"}}>Watch Ad</div>
          </div>
          <div style={{background:"linear-gradient(135deg,#0a0800,#1a1200)",border:"1px solid #c9a84c33",borderRadius:20,padding:24,marginBottom:16,textAlign:"center",animation:"glow 3s ease-in-out infinite"}}>
            <div style={{fontSize:60,marginBottom:12,animation:"float 1.5s ease-in-out infinite"}}>{currentAd.logo}</div>
            <div style={{fontSize:18,fontWeight:900,color:currentAd.color,fontFamily:"'Cinzel',serif",marginBottom:6}}>{currentAd.title}</div>
            <div style={{fontSize:13,color:"#7a6830",marginBottom:16,lineHeight:1.6}}>{currentAd.desc}</div>
            <div style={{background:"#080712",borderRadius:12,padding:14,marginBottom:16,border:"1px solid #c9a84c18"}}>
              <div style={{fontSize:11,color:"#3a3020",marginBottom:6,letterSpacing:2,fontFamily:"'Orbitron',monospace"}}>REWARD FOR WATCHING</div>
              <div style={{fontSize:32,fontWeight:900,color:"#f5d380",fontFamily:"'Orbitron',monospace"}}>+PKR {rewardPerAd}</div>
            </div>
            <div style={{position:"relative",height:8,background:"#1e1a30",borderRadius:4,overflow:"hidden",marginBottom:12}}>
              <div style={{position:"absolute",left:0,top:0,height:"100%",background:"linear-gradient(90deg,#8b6914,#c9a84c,#f5d380)",borderRadius:4,transition:"width 1s linear",width:`${(15-timer)/15*100}%`}}/>
            </div>
            <div style={{fontSize:28,fontWeight:900,color:"#c9a84c",fontFamily:"'Orbitron',monospace"}}>{timer}s</div>
            <div style={{fontSize:11,color:"#3a3020",marginTop:4}}>Please watch until timer ends</div>
          </div>
          <div style={{textAlign:"center",background:"#080712",border:"1px solid #c9a84c18",borderRadius:12,padding:"10px 0",fontSize:11,color:"#3a3020",fontFamily:"'Orbitron',monospace"}}>
            WATCHED: {sessionWatched.length}/10 TODAY
          </div>
        </div>
      </div>
    );
  }

  if(phase==="done"){
    return(
      <div style={{background:"var(--black)",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",padding:24,textAlign:"center"}}>
        <Particles/>
        <div style={{position:"relative",zIndex:1,animation:"fadeUp .4s ease"}}>
          <div style={{fontSize:80,marginBottom:20,animation:"coinSpin 1s ease-in-out"}}>🏆</div>
          <div style={{fontSize:22,fontWeight:900,color:"#f5d380",fontFamily:"'Cinzel',serif",marginBottom:8}}>Daily Ads Complete!</div>
          <div style={{fontSize:14,color:"#7a6830",marginBottom:24}}>You've watched all 10 ads for today.</div>
          <div style={{background:"linear-gradient(135deg,#0a0800,#1a1200)",border:"1px solid #c9a84c33",borderRadius:18,padding:20,marginBottom:24,animation:"glow 3s ease-in-out infinite"}}>
            <div style={{fontSize:12,color:"#4a4230",letterSpacing:2,marginBottom:8,fontFamily:"'Orbitron',monospace"}}>TODAY'S ADS EARNING</div>
            <div style={{fontSize:40,fontWeight:900,color:"#f5d380",fontFamily:"'Orbitron',monospace"}}>+PKR {sessionWatched.length*rewardPerAd}</div>
          </div>
          <Btn ch="← Back to Dashboard" v="gold" onClick={()=>{playCoin();onBack();}} s={{maxWidth:280,margin:"0 auto"}}/>
        </div>
      </div>
    );
  }

  return(
    <div style={{background:"var(--black)",minHeight:"100vh",position:"relative",overflow:"hidden"}}>
      <Particles/>
      <div style={{position:"relative",zIndex:1,padding:18,paddingBottom:48,animation:"fadeUp .3s ease"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          <button onClick={onBack} style={{background:"#0d0b1a",border:"1px solid #1e1a30",color:"#4a4230",borderRadius:10,padding:"9px 14px",cursor:"pointer",fontSize:17}}>←</button>
          <div>
            <div style={{fontSize:20,fontWeight:900,color:"#f5d380",fontFamily:"'Cinzel',serif"}}>Ads Center</div>
            <div style={{fontSize:11,color:"#4a4230"}}>Watch 10 ads daily — earn PKR {rewardPerAd}/ad</div>
          </div>
        </div>

function Auth({onLogin,toast}){
  const [tab,setTab]=useState("login");
  const [f,setF]=useState({name:"",phone:"",pw:"",ref:""});
  const [err,setErr]=useState("");
  const [showAgreement,setShowAgreement]=useState(false);
  const set=k=>v=>setF(p=>({...p,[k]:v}));

  const login=()=>{
    setErr("");
    if(isLocked(f.phone)){setErr(`Too many attempts. Try again in ${getLockRemaining(f.phone)}s`);return;}
    if(f.phone===ADMIN_PHONE&&f.pw===ADMIN_PASSWORD){playCoin();onLogin("ADMIN");return;}
    const u=Object.values(DB.users).find(u=>u.phone===f.phone&&u.password===f.pw);
    if(!u){recordLoginAttempt(f.phone);setErr("Invalid phone or password.");return;}
    playCoin();onLogin(u.id);
  };

  const attemptRegister=()=>{
    setErr("");
    if(!f.name||!f.phone||!f.pw){setErr("All fields are required.");return;}
    if(f.phone.length<10){setErr("Valid phone number required.");return;}
    if(Object.values(DB.users).find(u=>u.phone===f.phone)){setErr("This number is already registered.");return;}
    if(!f.ref){setErr("A referral code is required to join.");return;}
    const ref=Object.values(DB.users).find(u=>u.referralCode===f.ref.toUpperCase());
    if(!ref){setErr("Invalid referral code.");return;}
    if(!ref.depositDone&&ref.role!=="admin"){setErr("This referral code is not yet active.");return;}
    setShowAgreement(true);
  };

  const completeRegister=()=>{
    const ref=Object.values(DB.users).find(u=>u.referralCode===f.ref.toUpperCase());
    const id=uid();const code=mkCode(f.name);
    DB.users[id]={id,name:f.name,phone:f.phone,password:f.pw,role:"user",balance:0,totalEarned:0,referralCode:code,referredBy:f.ref.toUpperCase(),referrerId:ref.id,depositDone:false,canRefer:false,joinDate:new Date().toLocaleDateString("en-GB"),transactions:[],withdrawals:[],adsWatched:0,adsEarned:0,agreedToTerms:true,agreedAt:new Date().toISOString()};
    dbSave();
    toast("Account created! Complete deposit to activate.","success");
    playCoin();onLogin(id);
  };

  if(showAgreement) return <Agreement name={f.name} onAccept={completeRegister}/>;

  return(
    <div style={{minHeight:"100vh",background:"var(--black)",position:"relative",overflow:"hidden"}}>
      <Particles/>
      <WithdrawTicker/>
      <div style={{position:"relative",zIndex:1}}>
        <div style={{background:"radial-gradient(ellipse 160% 60% at 50% 0%,#1a1000 0%,transparent 70%)",padding:"36px 20px 20px",textAlign:"center"}}>
          <Logo size={1}/>
          <div style={{marginTop:16,fontSize:26,fontWeight:900,fontFamily:"'Cinzel',serif",color:"#fff",lineHeight:1.3,letterSpacing:1}}>
            Earn Referrals.<br/>
            <span style={{background:"linear-gradient(135deg,#f5d380,#c9a84c,#8b6914)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Get Paid Instantly.</span>
          </div>
        </div>
        <div style={{padding:"0 18px 48px"}}>
          <StatsBar/>
          <div style={{display:"flex",background:"#0d0b1a",border:"1px solid #1e1a30",borderRadius:14,padding:4,marginBottom:18}}>
            {["login","register"].map(t=>(
              <button key={t} onClick={()=>{playCoin();setTab(t);setErr("");}} style={{flex:1,padding:"11px 0",borderRadius:11,background:tab===t?"linear-gradient(135deg,#3d2c00,#c9a84c,#8b6914)":"transparent",color:tab===t?"#0a0800":"#4a4230",border:"none",fontWeight:800,fontSize:12,cursor:"pointer",letterSpacing:1,fontFamily:"'Rajdhani',sans-serif",transition:"all .2s"}}>
                {t==="login"?"Sign In":"Create Account"}
              </button>
            ))}
          </div>
          <Card glow s={{padding:22,animation:"fadeUp .4s ease",marginBottom:14}}>
            {tab==="register"&&<Inp label="Full Name" value={f.name} onChange={set("name")} placeholder="John Smith" required/>}
            <Inp label="Phone Number" value={f.phone} onChange={set("phone")} placeholder="+923XXXXXXXXX" type="tel" required/>
            <Inp label="Password" value={f.pw} onChange={set("pw")} placeholder="Create a strong password" type="password" required/>
            {tab==="register"&&<Inp label="Referral Code" value={f.ref} onChange={set("ref")} placeholder="Enter referral code" hint="⚠ Valid referral code is mandatory to join" required/>}
            {err&&<div style={{background:"#150606",border:"1px solid #7f1d1d33",borderRadius:10,padding:"11px 14px",color:"#f87171",fontSize:12,marginBottom:14,fontWeight:600}}>{err}</div>}
            <Btn ch={tab==="login"?"Sign In to RefPay →":"Continue to Agreement →"} onClick={tab==="login"?login:attemptRegister}/>
          </Card>
          <div style={{background:"linear-gradient(135deg,#0a0800,#1a1200)",border:"1px solid #c9a84c22",borderRadius:18,padding:18,marginBottom:14}}>
            <div style={{fontSize:14,fontWeight:900,background:"linear-gradient(135deg,#c9a84c,#f5d380)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:14,fontFamily:"'Cinzel',serif",letterSpacing:1}}>👑 Investment Plans</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {PLANS.map(p=>(
                <div key={p.amount} style={{background:"#080712",border:`1px solid ${p.color}22`,borderRadius:12,padding:"13px 12px",borderLeft:`2px solid ${p.color}55`,transition:"all .2s"}}>

                  <div style={{fontWeight:800,fontSize:12,color:p.color,fontFamily:"'Rajdhani',sans-serif"}}>{p.label}</div>
                  <div style={{fontSize:10,color:"#3a3020",marginTop:1,fontFamily:"'Orbitron',monospace"}}>PKR {p.amount.toLocaleString()}</div>
                  <div style={{fontSize:14,fontWeight:900,color:"#f5d380",marginTop:6,fontFamily:"'Orbitron',monospace"}}>+{p.split.toLocaleString()}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function Withdraw({userId,onBack,toast,refresh}){
  const user=DB.users[userId];
  const [amt,setAmt]=useState("");
  const [method,setMethod]=useState("easypaisa");
  const [acc,setAcc]=useState("");
  const [name,setName]=useState("");
  const n=parseInt(amt)||0;

  const submit=()=>{
    if(n<MIN_WITHDRAW){toast(`Min withdrawal: PKR ${MIN_WITHDRAW}`,"error");return;}
    if(n>user.balance){toast("Insufficient balance","error");return;}
    if(!acc||!name){toast("Account details required","error");return;}
    DB.users[userId].balance-=n;
    const w={id:tid(),userId,userName:user.name,amount:n,fee:0,youGet:n,method,accNumber:acc,accName:name,date:new Date().toLocaleDateString("en-GB"),status:"pending"};

  const methods=[
    {id:"easypaisa",l:"EasyPaisa",icon:"💚",c:"#27ae60"},

    {id:"binance",l:"Binance",icon:"🟡",c:"#f0b90b"},

  return(
    <div style={{background:"var(--black)",minHeight:"100vh",position:"relative",overflow:"hidden"}}>

            <div style={{fontSize:17,color:"#4a4230",marginBottom:6,fontWeight:800,fontFamily:"'Cinzel',serif"}}>No Active Tasks</div>
            <div style={{fontSize:12,color:"#2a2020"}}>New tasks will appear here. Check back soon!</div>
          </Card>
        ):(
          activeTasks.map(task=>{
            const mySub=mySubmissions.find(s=>s.taskId===task.id);
            const isActive=activeTask===task.id;
            return(
              <Card key={task.id} glow={isActive} color="#c9a84c" s={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div style={{flex:1,marginRight:12}}>
                    <div style={{fontSize:14,fontWeight:900,color:"#f5d380",marginBottom:4,fontFamily:"'Rajdhani',sans-serif"}}>{task.title}</div>
                    <div style={{fontSize:11,color:"#4a4230",lineHeight:1.6}}>{task.description}</div>
                  </div>
                  <div style={{textAlign:"center",flexShrink:0}}>
                    <div style={{fontSize:18,fontWeight:900,color:"#c9a84c",lineHeight:1,fontFamily:"'Orbitron',monospace"}}>{task.commission.toLocaleString()}</div>
                    <div style={{fontSize:8,color:"#3a3020",fontWeight:700,fontFamily:"'Orbitron',monospace"}}>PKR</div>
                  </div>
                </div>
                {mySub?(
                  <div style={{background:mySub.status==="approved"?"#0a1f0d":mySub.status==="rejected"?"#150606":"#120e00",border:`1px solid ${mySub.status==="approved"?"#27ae6022":mySub.status==="rejected"?"#7f1d1d":"#c9a84c22"}`,borderRadius:11,padding:"10px 14px"}}>
                    <div style={{fontSize:13,fontWeight:800,color:mySub.status==="approved"?"#27ae60":mySub.status==="rejected"?"#e74c3c":"#c9a84c",fontFamily:"'Rajdhani',sans-serif"}}>
                      {mySub.status==="approved"?"✦ Approved — Paid!":mySub.status==="rejected"?"✕ Rejected":"⏳ Under Review..."}
                    </div>
                  </div>
                ):isActive?(
                  <div style={{animation:"fadeIn .2s ease"}}>
                    <Inp label="Submission Link or Details" value={sub} onChange={setSub} placeholder="YouTube / Google Drive link..." rows={3}/>
                    <div style={{display:"flex",gap:7}}>
                      <Btn ch="Submit ✦" v="gold" onClick={()=>submit(task.id)} disabled={!sub.trim()}/>
                      <Btn ch="Cancel" v="dark" onClick={()=>setActiveTask(null)} s={{flex:"0 0 90px"}}/>
                    </div>
                  </div>
                ):(
                  <Btn ch="Accept Task →" v="ghost" onClick={()=>{playCoin();setActiveTask(task.id);}}/>
                )}
              </Card>
            );
          })
        )}
      </div>
    </div>
  );
}

            </div>
            <div style={{fontSize:11,color:"#3a3020",textAlign:"center"}}>Share this code — earn PKR {(DB.transactions.find(t=>t.userId===userId&&t.status==="approved")?.referrerShare)||"—"} per referral</div>

function AdminPanel({onLogout,toast}){
  const [tab,setTab]=useState("deposits");
  const [tick,setTick]=useState(0);
  const refresh=()=>setTick(t=>t+1);
  const s=DB.settings;

  const [ep,setEp]=useState(s.adminEasypaisa);
  const [jc,setJc]=useState(s.adminJazzcash);
  const [bankNum,setBankNum]=useState(s.adminBank.account);
  const [bankName,setBankName]=useState(s.adminBank.name);
  const [bankTitle,setBankTitle]=useState(s.adminBank.title);
  const [binUid,setBinUid]=useState(s.adminBinance.uid);
  const [binName,setBinName]=useState(s.adminBinance.name);
  const [adsEnabled,setAdsEnabled]=useState(s.adsEnabled);
  const [adsPerSession,setAdsPerSession]=useState(String(s.adsPerSession));
  const [nt,setNt]=useState({title:"",desc:"",cat:"Video Editing",commission:"",deadline:"",req:""});
  const snt=k=>v=>setNt(p=>({...p,[k]:v}));

  const pDeps=DB.transactions.filter(t=>t.status==="pending");
  const pW=DB.withdrawals.filter(w=>w.status==="pending");
  const pSubs=DB.taskSubmissions.filter(s=>s.status==="pending");
  const users=Object.values(DB.users).filter(u=>u.role!=="admin");
  const aDeps=DB.transactions.filter(t=>t.status==="approved");
  const totalAdmin=aDeps.reduce((ss,t)=>ss+t.adminShare,0);
  const totalRef=aDeps.reduce((ss,t)=>ss+t.referrerShare,0);

  const saveSettings=()=>{
    DB.settings.adminEasypaisa=ep;DB.settings.adminJazzcash=jc;
    DB.settings.adminBank={name:bankName,account:bankNum,title:bankTitle};
    DB.settings.adminBinance={uid:binUid,name:binName};
    DB.settings.adsEnabled=adsEnabled;DB.settings.adsPerSession=parseInt(adsPerSession)||10;
    dbSave();
    toast("All settings saved!","success");refresh();
  };

  const appD=id=>{const t=DB.transactions.find(x=>x.id===id);if(!t)return;t.status="approved";if(DB.users[t.userId]){DB.users[t.userId].depositDone=true;DB.users[t.userId].canRefer=true;}if(t.referrerId&&DB.users[t.referrerId]){DB.users[t.referrerId].balance+=t.referrerShare;DB.users[t.referrerId].totalEarned+=t.referrerShare;}DB.users.ADMIN.balance+=t.adminShare;DB.users.ADMIN.totalEarned+=t.adminShare;dbSave();playCoin();toast(`Approved! Earned PKR ${t.adminShare.toLocaleString()}`,"success");refresh();};
  const rejD=id=>{const t=DB.transactions.find(x=>x.id===id);if(t)t.status="rejected";dbSave();toast("Deposit rejected","error");refresh();};
  const appW=id=>{const w=DB.withdrawals.find(x=>x.id===id);if(!w)return;w.status="approved";dbSave();playCoin();toast(`Send PKR ${w.youGet.toLocaleString()} to ${w.accNumber}`,"success");refresh();};
  const rejW=id=>{const w=DB.withdrawals.find(x=>x.id===id);if(!w)return;w.status="rejected";if(DB.users[w.userId])DB.users[w.userId].balance+=w.amount;dbSave();toast("Rejected — balance refunded","info");refresh();};
  const appS=id=>{const ss=DB.taskSubmissions.find(x=>x.id===id);if(!ss)return;ss.status="approved";if(DB.users[ss.userId]){DB.users[ss.userId].balance+=ss.taskCommission;DB.users[ss.userId].totalEarned+=ss.taskCommission;}dbSave();playCoin();toast(`Task approved! PKR ${ss.taskCommission.toLocaleString()} paid`,"success");refresh();};
  const rejS=id=>{const ss=DB.taskSubmissions.find(x=>x.id===id);if(ss)ss.status="rejected";dbSave();toast("Task rejected","error");refresh();};
  const addTask=()=>{if(!nt.title||!nt.commission){toast("Title and commission required","error");return;}DB.tasks.push({id:tid(),title:nt.title,description:nt.desc,category:nt.cat,commission:parseInt(nt.commission)||0,deadline:nt.deadline||"Open",requirements:nt.req,status:"active",date:new Date().toLocaleDateString("en-GB")});setNt({title:"",desc:"",cat:"Video Editing",commission:"",deadline:"",req:""});dbSave();playCoin();toast("Task posted!","success");refresh();};
  const deleteTask=id=>{const idx=DB.tasks.findIndex(t=>t.id===id);if(idx>-1)DB.tasks.splice(idx,1);dbSave();toast("Task deleted","info");refresh();};

  const tabs=[
    ["deposits",`Deposits (${pDeps.length})`,"#c9a84c"],
    ["withdrawals",`Withdrawals (${pW.length})`,"#7dd3fc"],
    ["tasks",`Tasks (${pSubs.length})`,"#a78bfa"],
    ["newtask","+ New Task","#27ae60"],
    ["members",`Members (${users.length})`,"#94a3b8"],
    ["settings","⚙️ Settings","#f0b90b"],
    ["ads","📺 Ads","#e91e8c"],
  ];

  return(
    <div style={{background:"var(--black)",minHeight:"100vh",position:"relative",overflow:"hidden"}}>
      <Particles/>
      <div style={{position:"relative",zIndex:1,padding:"16px 16px 48px",animation:"fadeUp .35s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <Logo/>
            <div style={{display:"inline-flex",alignItems:"center",gap:5,marginTop:6,background:"#0a0800",border:"1px solid #c9a84c22",borderRadius:20,padding:"3px 11px"}}>
              <span style={{fontSize:9,fontWeight:800,color:"#c9a84c",letterSpacing:2,fontFamily:"'Orbitron',monospace"}}>🔐 ADMIN DASHBOARD</span>
            </div>
          </div>
          <button onClick={()=>{playCoin();onLogout();}} style={{background:"#0d0b1a",border:"1px solid #1e1a30",color:"#4a4230",borderRadius:9,padding:"7px 13px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Rajdhani',sans-serif"}}>Sign Out</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {[
            {l:"Platform Revenue",v:`₨${totalAdmin.toLocaleString()}`,c:"#c9a84c",i:"💰"},
            {l:"Paid to Members",v:`₨${totalRef.toLocaleString()}`,c:"#27ae60",i:"💸"},
            {l:"Registered",v:users.length,c:"#a78bfa",i:"👥"},
            {l:"Active Members",v:users.filter(u=>u.depositDone).length,c:"#7dd3fc",i:"✦"},
            {l:"Pending Actions",v:pDeps.length+pW.length+pSubs.length,c:pDeps.length+pW.length+pSubs.length>0?"#e74c3c":"#3a3020",i:"⏳"},
            {l:"Admin Code",v:"REFPAY2025",c:"#f5d380",i:"🔗"},
          ].map(ss=>(
            <div key={ss.l} style={{background:"#0d0b1a",border:"1px solid #1e1a30",borderRadius:13,padding:12,borderTop:`2px solid ${ss.c}33`}}>
              <div style={{fontSize:9,color:"#3a3020",letterSpacing:.5,textTransform:"uppercase",marginBottom:4,fontWeight:700,fontFamily:"'Orbitron',monospace"}}>{ss.i} {ss.l}</div>
              <div style={{fontSize:16,fontWeight:900,color:ss.c,fontFamily:"'Orbitron',monospace"}}>{ss.v}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:5,marginBottom:14,overflowX:"auto",paddingBottom:3,WebkitOverflowScrolling:"touch"}}>
          {tabs.map(([id,l,c])=>(
            <button key={id} onClick={()=>{playCoin();setTab(id);}} style={{padding:"7px 12px",borderRadius:20,whiteSpace:"nowrap",flexShrink:0,background:tab===id?c+"18":"#0d0b1a",color:tab===id?c:"#3a3020",border:`1px solid ${tab===id?c+"44":"#1e1a30"}`,fontWeight:700,fontSize:10,cursor:"pointer",transition:"all .2s",fontFamily:"'Rajdhani',sans-serif"}}>{l}</button>
          ))}

        {tab==="ads"&&(<div><Card glow color="#e91e8c" s={{marginBottom:12}}><div style={{fontSize:15,fontWeight:900,color:"#f5d380",marginBottom:16,fontFamily:"'Cinzel',serif"}}>📺 Ads Revenue Management</div><div style={{background:"#080712",border:"1px solid #c9a84c18",borderRadius:12,padding:14,marginBottom:14}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{[{l:"Total Ad Views",v:DB.adViews.length,c:"#c9a84c"},{l:"Total Paid (Ads)",v:`PKR ${DB.adViews.reduce((s,v)=>s+v.earn,0).toLocaleString()}`,c:"#f5d380"},{l:"Active Users",v:Object.values(DB.users).filter(u=>u.role!=="admin"&&u.depositDone).length,c:"#27ae60"},{l:"Ads Per Session",v:DB.settings.adsPerSession,c:"#a78bfa"}].map(ss=>(<div key={ss.l} style={{textAlign:"center",padding:10,background:"#0d0b1a",borderRadius:10,border:"1px solid #1e1a30"}}><div style={{fontSize:18,fontWeight:900,color:ss.c,fontFamily:"'Orbitron',monospace"}}>{ss.v}</div><div style={{fontSize:8,color:"#3a3020",marginTop:2,fontFamily:"'Orbitron',monospace"}}>{ss.l.toUpperCase()}</div></div>))}</div></div><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:"#080712",borderRadius:12,marginBottom:10,border:"1px solid #1e1a30"}}><div><div style={{fontWeight:800,color:"#f5d380",fontSize:13}}>Ads Enabled</div><div style={{fontSize:10,color:"#3a3020"}}>Allow users to watch ads for rewards</div></div><div onClick={()=>{playCoin();setAdsEnabled(a=>!a);}} style={{width:44,height:24,borderRadius:12,background:adsEnabled?"linear-gradient(135deg,#27ae60,#2ecc71)":"#1e1a30",cursor:"pointer",position:"relative",transition:"all .3s",border:`1px solid ${adsEnabled?"#27ae6055":"#2a2a4a"}`}}><div style={{position:"absolute",top:3,left:adsEnabled?22:3,width:16,height:16,borderRadius:"50%",background:"#fff",transition:"all .3s"}}/></div></div><Inp label="Ads Per Session (per user/day)" value={adsPerSession} onChange={setAdsPerSession} type="number" placeholder="10"/><Btn ch="💾 Save Ads Settings" v="gold" onClick={saveSettings}/></Card><Card glow color="#f0b90b" s={{marginBottom:12}}><div style={{fontSize:14,fontWeight:900,color:"#f5d380",marginBottom:12,fontFamily:"'Cinzel',serif"}}>💰 Real Ads Setup (Google AdSense)</div><div style={{background:"#080712",borderRadius:12,padding:14,marginBottom:10,border:"1px solid #f0b90b22"}}><div style={{fontSize:10,fontWeight:700,color:"#f0b90b",letterSpacing:2,marginBottom:8,fontFamily:"'Orbitron',monospace"}}>HOW TO ENABLE REAL ADS</div><div style={{fontSize:11,color:"#7a6830",lineHeight:1.8}}><div style={{marginBottom:6}}>1️⃣ Go to <span style={{color:"#f5d380",fontWeight:700}}>adsense.google.com</span> → Create account</div><div style={{marginBottom:6}}>2️⃣ Add your website domain → Get Publisher ID</div><div style={{marginBottom:6}}>3️⃣ Copy your <span style={{color:"#f5d380",fontWeight:700}}>ca-pub-XXXXXXXXXX</span> code</div><div style={{marginBottom:6}}>4️⃣ Paste it in the ADS SLOT CODE field below</div><div style={{marginBottom:6}}>5️⃣ Replace ad slot ID in the HTML code</div><div>6️⃣ Users watch real ads → You earn real revenue!</div></div></div><div style={{background:"#0a0800",border:"1px solid #c9a84c33",borderRadius:12,padding:14,marginBottom:10}}><div style={{fontSize:9,fontWeight:700,color:"#4a4230",letterSpacing:2,marginBottom:8,fontFamily:"'Orbitron',monospace"}}>ADSENSE PUBLISHER ID</div><div style={{background:"#080712",borderRadius:8,padding:10,fontFamily:"'Orbitron',monospace",fontSize:11,color:"#c9a84c",border:"1px dashed #c9a84c33",userSelect:"all"}}>ca-pub-XXXXXXXXXXXXXXXX</div><div style={{fontSize:10,color:"#3a3020",marginTop:6}}>Replace XXXXXXXXXXXXXXXX with your real Publisher ID from Google AdSense dashboard</div></div><div style={{background:"#0a1200",border:"1px solid #27ae6033",borderRadius:12,padding:14}}><div style={{fontSize:9,fontWeight:700,color:"#27ae60",letterSpacing:2,marginBottom:8,fontFamily:"'Orbitron',monospace"}}>ESTIMATED DAILY REVENUE</div><div style={{dis // MAIN APP
// ═══════════════════════════════
function App(){
  const [screen,setScreen]=useState("splash");
  const [userId,setUserId]=useState(null);
  const [toastData,setToastData]=useState(null);
  const [tick,setTick]=useState(0);
  const showToast=(msg,type="info")=>setToastData({msg,type});
  const refresh=()=>setTick(t=>t+1);

  // Hide loading screen when app is ready
  useEffect(()=>{ window.__hideLoading && window.__hideLoading(); },[]);

  const handleLogin=id=>{
    setUserId(id);
    const u=DB.users[id];
    setScreen(u.role==="admin"?"admin":!u.depositDone?"pending":"dashboard");
  };
  const handleLogout=()=>{setUserId(null);setScreen("auth");};
  const user=userId?DB.users[userId]:null;

  return(
    <div style={{background:"var(--black)",minHeight:"100vh"}}>
      <div style={{maxWidth:440,margin:"0 auto",minHeight:"100vh",position:"relative"}}>
        {toastData&&<Toast msg={toastData.msg} type={toastData.type} onClose={()=>setToastData(null)}/>}
        {screen==="splash"&&<Splash onDone={()=>setScreen("auth")}/>}
        {screen==="auth"&&<Auth onLogin={handleLogin} toast={showToast}/>}
        {(screen==="dashboard"||screen==="pending")&&user&&(
          <UserDash key={tick} userId={userId} onLogout={handleLogout}
            onDeposit={()=>setScreen("deposit")}
            onWithdraw={()=>setScreen("withdraw")}
            onTasks={()=>setScreen("tasks")}
            onAds={()=>setScreen("ads")}
            toast={showToast}/>
        )}
        {screen==="deposit"&&user&&(
          <Deposit userId={userId}
            onBack={()=>setScreen(user.depositDone?"dashboard":"pending")}
            onDone={()=>{refresh();setScreen("pending");}}
            toast={showToast}/>
        )}
        {screen==="withdraw"&&user&&(
          <Withdra
